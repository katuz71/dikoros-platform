name: Apply product note sync patch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply repository patch
        run: python scripts/apply_product_note_patch.py
      - name: Restore temporary patch files
        run: git checkout -- .github/workflows/apply-product-note-sync.yml scripts/apply_product_note_patch.py
      - name: Validate Python syntax
        run: python -m py_compile services/catalog_sync.py services/db_schema.py routers/products.py models/schemas.py
      - name: Commit patch
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Sync and display product notes"
          git push
